<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal – SwiftQ</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body class="terminal-root">
<div id="toast-container" class="toast-container"></div>

<div class="terminal-container">
  <!-- Sidebar de Status/Histórico -->
  <aside class="term-sidebar">
    <div class="term-header-mini">
        <img id="brand-logo" src="/static/logo.png" alt="Logo" class="logo-mini">
        <h2 id="sys-name"><strong>Swift</strong>Q</h2>
    </div>
    
    <div class="user-info-card">
        <div id="user-bar">Carregando...</div>
    </div>

    <div class="queue-monitor">
        <h3><i class="fa fa-layer-group"></i> Monitor de Filas</h3>
        <div class="queue-row" id="queue-row"></div>
    </div>

    <div class="last-call-box">
        <span class="tag">ÚLTIMA CHAMADA</span>
        <div class="pw" id="lcb-pw">---</div>
        <div class="info" id="lcb-tm">Aguardando...</div>
    </div>

    <div class="term-footer">
        <span id="admin-link" style="display:none"><a href="/admin" class="footer-link"><i class="fa fa-gear"></i> Adm</a></span>
        <span id="reports-link" style="display:none"><a href="/reports" class="footer-link"><i class="fa fa-chart-bar"></i> Relatórios</a></span>
        <a href="#" onclick="logout()" class="footer-link logout"><i class="fa fa-power-off"></i> Sair</a>
    </div>
  </aside>

  <!-- Área Principal de Ação -->
  <main class="term-main">
    <div class="main-action">
        <button class="call-giant-btn" onclick="callNext()">
            <div class="btn-content">
                <i class="fa fa-bullhorn"></i>
                <span>CHAMAR PRÓXIMO</span>
                <small>Clique aqui ou aperte ENTER</small>
            </div>
        </button>
    </div>

    <div class="secondary-actions">
        <div class="grid-label">Chamada por Tipo</div>
        <div class="type-grid" id="type-grid"></div>
        
        <div class="utility-row">
            <button class="util-btn recall" onclick="recall()"><i class="fa fa-redo"></i> Repetir</button>
            <button class="util-btn absent" onclick="markAbsent()"><i class="fa fa-user-xmark"></i> Ausente</button>
        </div>
    </div>
  </main>
</div>

<script>
  let session = null;
  let currentGuiche = '';

  function getAuth() {
    try { return JSON.parse(localStorage.getItem('sa_session') || '{}'); } catch(e) { return {}; }
  }

  function showMessage(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'error' ? 'fa-circle-xmark' : (type === 'success' ? 'fa-circle-check' : 'fa-info-circle');
    toast.innerHTML = `<i class="fa ${icon}"></i> <span>${msg}</span>`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.animation = 'toastZoomOut 0.3s ease forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
  }

  function authH() {
    return { 'Authorization': 'Bearer ' + (getAuth()?.token || ''), 'Content-Type':'application/json' };
  }

  function logout() {
    localStorage.removeItem('sa_session');
    window.location = '/login';
  }

  async function init() {
    session = getAuth();
    if(!session?.token) { window.location = '/login'; return; }

    // Valida token
    try {
      const r = await fetch('/api/auth/me', {headers: authH()});
      if(!r.ok) { logout(); return; }
    } catch(e) { logout(); return; }

    currentGuiche = session.guiche || 'Guichê';
    document.getElementById('user-bar').textContent = `👤 ${session.user?.name} &nbsp;·&nbsp; 🖥 ${currentGuiche}`;
    document.getElementById('user-bar').innerHTML = `<i class="fa fa-user"></i> ${session.user?.name} &nbsp;·&nbsp; <i class="fa fa-desktop"></i> ${currentGuiche}`;

    if(session.user?.role === 'admin') {
      document.getElementById('admin-link').style.display = 'block';
      document.getElementById('reports-link').style.display = 'block';
    }

    // Carrega status e tipos
    const res  = await fetch('/api/status', { headers: authH() });
    const data = await res.json();
    
    // Aplicar Cores do Tenant
    const root = document.documentElement;
    if(data.tenant?.primary)   root.style.setProperty('--primary', data.tenant.primary);
    if(data.tenant?.secondary) root.style.setProperty('--accent',  data.tenant.secondary);
    if(data.tenant?.bg)        root.style.setProperty('--bg',      data.tenant.bg);

    if(data.system_name) {
      document.getElementById('sys-name').textContent = data.system_name;
      const logoImg = document.getElementById('brand-logo');
      if (data.tenant?.logo) {
        logoImg.src = data.tenant.logo;
        logoImg.style.display = 'block';
      }
      document.title = data.system_name + ' – Terminal';
    }
    buildTypeButtons(data.types || []);
    buildQueueBadges(data.types || [], data.queues || {});
    if(data.last_called) setLastCall(data.last_called);

    // Socket.io for Realtime & Kick
    const socket = io();
    const tid = session.user.tenant.id;
    socket.on('connect', () => {
        console.log("Terminal Connected");
    });
    socket.on(`terminal_kick_${tid}_${currentGuiche}`, (data) => {
        alert(`Atenção: Seu terminal foi assumido por ${data.new_user}. Você será desconectado.`);
        logout();
    });
  }

  function buildTypeButtons(types) {
    const grid = document.getElementById('type-grid');
    grid.innerHTML = '';
    types.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'tbn';
      btn.id = 'tbn-' + t.code;
      btn.style.background = `linear-gradient(135deg, ${t.color}dd, ${t.color}99)`;
      btn.style.color = isLight(t.color) ? '#111' : '#fff';
      btn.innerHTML = `<i class="fa ${t.icon}"></i> ${t.name} <span class="t-sub">${t.code}</span>`;
      btn.onclick = () => callNext(t.code);
      grid.appendChild(btn);
    });
  }

  function buildQueueBadges(types, queues) {
    const row = document.getElementById('queue-row');
    row.style.gridTemplateColumns = `repeat(${types.length},1fr)`;
    row.innerHTML = types.map(t => `
      <div class="queue-badge">
        <div class="qb-type" id="q-${t.code}" style="color:${t.color}">${queues[t.code]||0}</div>
        <div class="qb-count">${t.name}</div>
      </div>`).join('');
  }

  function isLight(hex) {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000 > 128;
  }

  async function updateStatus() {
    try {
      const res  = await fetch('/api/status', { headers: authH() });
      const data = await res.json();
      const q    = data.queues || {};
      Object.keys(q).forEach(k => { const el=document.getElementById('q-'+k); if(el) el.textContent=q[k]; });
    } catch(e) {}
  }

  function setLastCall(d) {
    document.getElementById('lcb-pw').textContent = d.password;
    document.getElementById('lcb-tm').textContent = `🖥 ${d.terminal}  ·  ${d.time||''}`;
  }

  async function callNext(type=null) {
    let url = `/api/call?terminal=${encodeURIComponent(currentGuiche)}`;
    if(type) url += `&type=${type}`;
    try {
      const res  = await fetch(url, {method:'POST', headers: authH()});
      const data = await res.json();
      if(data.error) { showNotice(data.error,'warn'); }
      else { setLastCall(data); updateStatus(); animBtn(type||null); }
    } catch(e) { showNotice('Erro de conexão','err'); }
  }

  async function recall() {
    try {
      const r = await fetch('/api/recall', {method:'POST', headers: authH()});
      const d = await r.json();
      if(d.error) { showNotice(d.error, 'warn'); }
      else {
        showNotice('Repetida: ' + d.password, 'ok');
        setLastCall(d);
      }
    } catch(e) { showNotice('Erro de conexão', 'warn'); }
  }

  async function markAbsent() {
    try {
      const r = await fetch('/api/absent', {method:'POST', headers: authH()});
      const d = await r.json();
      if(d.error) { showNotice(d.error, 'warn'); }
      else {
        showNotice('Senha Ausente: ' + d.absent, 'ok');
      }
    } catch(e) { showNotice('Erro de conexão', 'warn'); }
  }

  function animBtn(code) {
    if(!code) return;
    const b = document.getElementById('tbn-'+code);
    if(!b) return; b.style.transform='scale(.94)'; setTimeout(()=>b.style.transform='',200);
  }

  function showNotice(msg, level='ok') {
    const colors = {ok:'var(--accent)', warn:'var(--warning)', err:'var(--danger)'};
    const el = document.getElementById('lcb-tm');
    el.style.color = colors[level]; el.textContent = msg;
    setTimeout(()=>{ el.style.color=''; updateStatus(); }, 3000);
  }

  window.addEventListener('keydown', e => {
    if(e.key === 'Enter') callNext();
  });

  setInterval(updateStatus, 6000);
  init();
</script>
</body>
</html>
