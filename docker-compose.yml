services:
  swiftq-app:
    build: .
    container_name: swiftq_service
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data  # Persistência de dados (Banco de Dados / Logos / Downloads)
      - ./static:/app/static # Persistência de arquivos estáticos/customizações
    environment:
      - TZ=America/Sao_Paulo # Mantém o fuso horário correto para o Brasil
    restart: always

# EasyPanel usa o padrão do Docker Compose para subir a aplicação.
# O Banco de Dados SQLite (database.db) será mantido na pasta ./data no volume.
